schedule:
  cron: '*/5 * * * *'
sources:
  git:
    enabled: true
    provider: github
    api_base_url: https://api.github.com
    token: ${GIT_TOKEN}
    repos:
    - BoYu1646/report_ai
    include:
      commits: true
      pull_requests: true
      issues: true
    use_demo_when_missing_token: false
    trust_env: false
  feishu:
    enabled: true
    auth_mode: lark_cli
    lark_cli_identity: user
    api_base_url: https://open.feishu.cn/open-apis
    app_id: ${FEISHU_APP_ID}
    app_secret: ${FEISHU_APP_SECRET}
    tenant_access_token: ${FEISHU_TENANT_ACCESS_TOKEN}
    user_access_token: ${FEISHU_USER_ACCESS_TOKEN}
    use_demo_when_missing_credentials: false
    messages:
      enabled: true
      chat_ids:
      - oc_c65e84bb78aa536e48efb159b6b768b3
      limit_per_chat: 50
    calendar:
      enabled: true
      calendar_ids:
      - feishu.cn_nF71ypDXBIX7b53TjtDMif@group.calendar.feishu.cn
      limit_per_calendar: 50
llm:
  provider: openai_compatible
  model: gpt-4o-mini
  api_key: ${OPENAI_API_KEY}
  base_url: https://api.openai.com/v1
  temperature: 0.8
  timeout_seconds: 60
report:
  template: '# {title}


    > 周期：{week_start} 至 {week_end}

    > 数据概览：Git {git_count} 条，飞书 {feishu_count} 条。


    ## 本周概览

    {executive_summary}


    ## 重点成果

    {highlights}


    ## 本周完成

    {done}


    ## 进行中

    {in_progress}


    ## 风险/阻塞

    {risks}


    ## 下周计划

    {next_week}


    ## 工作明细

    {details}


    ## 数据来源

    {sources}'
  title: 研发工作周报
  sections:
  - done
  - in_progress
  - risks
  - next_week
  output_dir: ./reports
  filename_prefix: weekly-report
  language: zh-CN
web:
  host: 0.0.0.0
  port: 8000
  enable_export: true
